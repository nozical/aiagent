name: Predict Attrition and Email Result

on:
  push:
    paths:
      - 'data/2_PAproject_2_4_machine_prediction.csv'
  workflow_dispatch: # 수동 실행 가능하도록 설정

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run prediction script
      run: python main.py

    - name: Send mail
      uses: dawidd6/action-send-mail@v4
      with:
        # 이메일 서버 설정 (Gmail 기준)
        server_address: smtp.gmail.com
        server_port: 465
        # GitHub Secrets에서 가져올 값들
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "[알림] 퇴직 예측 결과 보고서 - ${{ github.sha }}"
        to: ${{ secrets.MAIL_TO }}
        from: GitHub Actions Predictor
        body: |
          안녕하세요,
          
          GitHub Actions를 통한 퇴직 예측이 완료되었습니다.
          결과 파일(2_PAproject_2_4_machine_results.csv)을 첨부합니다.
          
          커밋 ID: ${{ github.sha }}
        # 첨부 파일 설정
        attachments: data/2_PAproject_2_4_machine_results.csv
        secure: true
