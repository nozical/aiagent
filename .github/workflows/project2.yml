name: Project2 - Gemini 영상 분석 및 결과 이메일 발송

on:
  push:
    paths:
      - 'project2/data/**'   # project2/data/ 폴더에 영상 파일이 변경될 때 자동 실행
  workflow_dispatch:          # GitHub 웹에서 수동 실행도 가능

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r project2/requirements.txt

    - name: Gemini 영상 분석 실행
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python project2/analysis.py

    - name: 분석 결과 이메일 발송
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "[보고서] Gemini 영상 분석 완료 - ${{ github.sha }}"
        to: ${{ secrets.MAIL_TO }}
        from: GitHub Actions Analyzer
        body: |
          안녕하세요,

          GitHub Actions에 의한 Gemini 영상 분석이 완료되었습니다.
          분석 결과 파일(analysis_result.txt)이 첨부되어 있습니다.

          - 실행 시각: ${{ github.event.head_commit.timestamp }}
          - 커밋 ID: ${{ github.sha }}
          - 변경된 파일: ${{ github.event.head_commit.message }}

          감사합니다.
        attachments: project2/results/analysis_result.txt
        secure: true
