name: Project4 - HLM 평가자 편향 분석 및 결과 이메일 발송

on:
  push:
    paths:
      - 'project4/data/**'   # project4/data/ 폴더 변경 시 자동 실행
  workflow_dispatch:          # GitHub 웹에서 수동 실행 가능

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r project4/requirements.txt

    - name: HLM 분석 실행
      run: python project4/analysis.py

    - name: 분석 결과 이메일 발송
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "[보고서] HLM 평가자 편향 분석 완료 - ${{ github.sha }}"
        to: ${{ secrets.MAIL_TO }}
        from: GitHub Actions Analyzer
        body: |
          안녕하세요,

          GitHub Actions에 의한 HLM 평가자 편향 분석이 완료되었습니다.
          아래 두 파일이 첨부되어 있습니다.

          1. analysis_log.txt  - ANOVA, HLM 요약, ICC, 편향 분석 결과
          2. adjusted_results.xlsx - 보정된 평가 점수 전체 데이터

          - 실행 시각: ${{ github.event.head_commit.timestamp }}
          - 커밋 ID: ${{ github.sha }}

          감사합니다.
        attachments: |
          project4/results/analysis_log.txt
          project4/results/adjusted_results.xlsx
        secure: true
