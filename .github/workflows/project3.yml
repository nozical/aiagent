name: Project3 - EDA 분석 및 결과 이메일 발송

on:
  push:
    paths:
      - 'project3/data/**'   # project3/data/ 폴더 변경 시 자동 실행
  workflow_dispatch:          # GitHub 웹에서 수동 실행 가능

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 의존성 설치
      run: |
        python -m pip install --upgrade pip setuptools
        pip install -r project3/requirements.txt

    - name: EDA 분석 실행
      run: python project3/analysis.py

    - name: 분석 결과 이메일 발송
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "[보고서] EDA 분석 완료 - ${{ github.sha }}"
        to: ${{ secrets.MAIL_TO }}
        from: GitHub Actions Analyzer
        body: |
          안녕하세요,

          GitHub Actions에 의한 EDA 분석이 완료되었습니다.
          아래 두 개의 차트가 첨부되어 있습니다.

          1. 부서 및 직무별 이탈률 히트맵
          2. 성과등급별 이탈률 막대그래프

          - 실행 시각: ${{ github.event.head_commit.timestamp }}
          - 커밋 ID: ${{ github.sha }}

          감사합니다.
        attachments: |
          project3/results/1_heatmap_attrition.png
          project3/results/2_barplot_performance.png
        secure: true
